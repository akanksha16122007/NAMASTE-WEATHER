<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeatherLive</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link
      rel="icon"
      type="image"
      href="https://uxwing.com/wp-content/themes/uxwing/download/weather/weather-icon.png"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="head">
        <div class="logo">
          <img
            src="https://uxwing.com/wp-content/themes/uxwing/download/weather/weather-icon.png"
            width="50px"
            height="50px"
            alt="WeatherLive logo"
          />
          <h2>WeatherLive</h2>
        </div>
        <nav class="nav-links">
          <a href="#">Home</a>
          <a href="About.html">About Us</a>
          <a href="Contact.html">Contact Us</a>
          <a href="FAQ.html">FAQ</a>
        </nav>
      </div>
    </header>
    <main>
      <div class="main">
        <div class="content">
          <div class="weather-card">
            <div class="hero">
              <h1>WeatherLive</h1>
              <p>Search any city to get live weather updates instantly.</p>
            </div>
            <div class="search-card">
              <input type="text" id="search" placeholder="Search city, e.g. New York" />
              <button type="button" id="searchButton" onclick="getWeather()">
                <span class="button-icon">🔎</span>
                <span class="button-text">Search</span>
                <span class="loader" id="loader"></span>
              </button>
            </div>
            <div id="result">
              <h3 class="subtext">No city searched yet. Enter a city above to start.</h3>
            </div>
            <div id="temp"></div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <p>©2026 WeatherLive. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
